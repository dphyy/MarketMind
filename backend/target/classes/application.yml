spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/marketmind}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:marketmind}
  jpa:
    hibernate:
      ddl-auto: none        # schema is owned by db/schema.sql, not Hibernate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always          # re-run schema + seed on every boot (schema drops first)
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/seed.sql

server:
  port: 8080

marketmind:
  # Sponsor API config. Left blank for the mock-first phase — the agent runs
  # entirely on seed data until these are filled in.
  brightdata:
    # Proxy-based Web Unlocker access. Requests are routed through the Bright Data
    # super-proxy with these credentials; the proxy unlocks + returns the page.
    host: ${BRIGHTDATA_HOST:}
    port: ${BRIGHTDATA_PORT:0}
    username: ${BRIGHTDATA_USERNAME:}
    password: ${BRIGHTDATA_PASSWORD:}
    zone: ${BRIGHTDATA_ZONE:web_unlocker1}
    # Image attached to mock/seed competitor snapshots that lack one, so the live
    # SenseNova path has an image to analyse even when the scrape falls back.
    mock-image-url: ${BRIGHTDATA_MOCK_IMAGE_URL:https://upload.wikimedia.org/wikipedia/commons/3/3a/Cat03.jpg}
  sensenova:
    api-key: ${SENSENOVA_API_KEY:}
    base-url: ${SENSENOVA_BASE_URL:https://api.sensenova.cn/v1}
    model: ${SENSENOVA_MODEL:SenseNova-U1}
    # OpenAI-compatible gateways (e.g. velaalpha) use /chat/completions.
    chat-path: ${SENSENOVA_CHAT_PATH:/chat/completions}
  kimi:
    # NOTE: confirm the base-url + model against the hackathon Kimi docs
    # (platform.kimi.ai). The voucher key may target a different endpoint.
    api-key: ${KIMI_API_KEY:}
    base-url: ${KIMI_BASE_URL:https://api.moonshot.cn/v1}
    model: ${KIMI_MODEL:kimi-k2.6}
  tokenrouter:
    # If an api-key is set, Kimi calls route through TokenRouter first (drop-in
    # base-url swap), then fall back to direct Kimi, then to rule-based logic.
    api-key: ${TOKENROUTER_API_KEY:}
    base-url: ${TOKENROUTER_BASE_URL:https://api.tokenrouter.com/v1}
  daytona:
    api-key: ${DAYTONA_API_KEY:}
    base-url: ${DAYTONA_BASE_URL:https://app.daytona.io/api}
    region: ${DAYTONA_REGION:us}
  agent:
    schedule-cron: "0 */15 * * * *"   # every 15 minutes
    mock-fallback-enabled: true        # fall back to seed data if a live call fails

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
